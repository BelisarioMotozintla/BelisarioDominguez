{% extends "base.html" %}

{% block content %}
<div class="container-fluid mt-4 mb-5">
    <div class="card shadow">
        <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
            <h2 class="h5 mb-0"><i class="bi bi-truck"></i> Traslado Masivo: Almacén ➔ Farmacia</h2>
            <span class="badge bg-white text-success fw-bold">Salida de Almacén</span>
        </div>
        <div class="card-body">
            <form id="form-movimiento" method="POST" action="{{ url_for('farmacia.nuevo_movimiento') }}">
                
                <!-- CABECERA: OBSERVACIONES GENERALES -->
                <div class="row mb-3 bg-light p-3 rounded border">
                    <div class="col-12">
                        <label class="form-label fw-bold">Motivo General del Traslado</label>
                        <input type="text" name="obs_general" class="form-control uppercase-input" 
                               value="REABASTECIMIENTO DE FARMACIA">
                    </div>
                </div>

                <div class="row mb-3 bg-light p-3 rounded border">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Tipo de Movimiento</label>
                    <select name="tipo_movimiento" id="tipo_movimiento" class="form-select border-primary" onchange="toggleDestino()">
                        <option value="TRASLADO_FARMACIA">Traslado a Farmacia (Interno)</option>
                        <option value="TRANSFERENCIA_EXTERNA">Transferencia a otra Unidad</option>
                        <option value="BAJA_CADUCIDAD">Baja por Caducidad</option>
                        <option value="BAJA_MERMA">Baja por Merma/Daño</option>
                    </select>
                </div>
                <div class="col-md-6" id="div_destino" style="display:none;">
                    <label class="form-label fw-bold">Unidad Médica Destino</label>
                    <input type="text" name="destino_externo" class="form-control uppercase-input" placeholder="Nombre de la Unidad">
                </div>
            </div>

            <!-- TABLA DE TRASLADO -->
                <div class="table-responsive">
                    <table class="table table-bordered align-middle" id="tabla-traslado">
                        <thead class="table-secondary">
                            <tr>
                                <th style="width: 40%;">Medicamento</th>
                                <th style="width: 25%;">Lote (Disponible)</th>
                                <th style="width: 15%;">Cantidad</th>
                                <th style="width: 5%;"></th>
                            </tr>
                        </thead>
                        <tbody id="cuerpo-traslado">
                            <!-- Filas dinámicas -->
                        </tbody>
                    </table>
                </div>

                <div class="d-flex justify-content-between mt-3">
                    <button type="button" class="btn btn-outline-success" onclick="agregarFila()">
                        <i class="bi bi-plus-circle"></i> Agregar otro medicamento
                    </button>
                    
                    <div>
                        <a href="{{ url_for('farmacia.listar_movimientos') }}" class="btn btn-outline-secondary me-2">Cancelar</a>
                        <button type="submit" class="btn btn-success px-5 shadow">
                            <i class="bi bi-arrow-left-right"></i> Procesar Traslado Total
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Template para filas -->
<template id="fila-mov-template">
    <tr>
        <td>
            <select name="id_medicamento[]" class="form-select select2-med" required></select>
        </td>
        <td>
            <select name="lote[]" class="form-select select-lote" required disabled>
                <option value="">Primero elige med...</option>
            </select>
            <small class="text-primary info-stock" style="font-size: 0.75rem;"></small>
        </td>
        <td>
            <input type="number" name="cantidad[]" class="form-control input-cantidad" min="1" required placeholder="0">
        </td>
        <td class="text-center">
            <button type="button" class="btn btn-outline-danger btn-sm" onclick="eliminarFila(this)">
                <i class="bi bi-trash"></i>
            </button>
        </td>
    </tr>
</template>

<script>
            // 1. Mostrar/Ocultar el campo de destino
                function toggleDestino() {
                    const tipo = document.getElementById('tipo_movimiento').value;
                    const divDestino = document.getElementById('div_destino');
                    const inputDestino = document.querySelector('input[name="destino_externo"]');
                    
                    if (tipo === 'TRANSFERENCIA_EXTERNA') {
                        divDestino.style.display = 'block';
                        inputDestino.setAttribute('required', 'true'); // Agrega requerimiento HTML5
                    } else {
                        divDestino.style.display = 'none';
                        inputDestino.removeAttribute('required');
                        inputDestino.value = ''; // Limpia el campo si cambian de opinión
                    }
                }

                // 2. Validación extra antes de enviar (por si acaso)
                document.getElementById('form-movimiento').onsubmit = function(e) {
                    const tipo = document.getElementById('tipo_movimiento').value;
                    const destino = document.querySelector('input[name="destino_externo"]').value.strip();
                    
                    if (tipo === 'TRANSFERENCIA_EXTERNA' && destino === "") {
                        e.preventDefault(); // Detiene el envío
                        alert("Por favor, especifica la Unidad Médica Destino.");
                        return false;
                    }
                };

            </script>

<script>
function agregarFila() {
    const template = document.getElementById('fila-mov-template').content.cloneNode(true);
    const tbody = document.getElementById('cuerpo-traslado');
    const nuevaFila = template.querySelector('tr');
    tbody.appendChild(nuevaFila);

    const $selectMed = $(nuevaFila).find('.select2-med');
    const $selectLote = $(nuevaFila).find('.select-lote');
    const $inputCant = $(nuevaFila).find('.input-cantidad');
    const $infoStock = $(nuevaFila).find('.info-stock');

    // Inicializar Select2
    $selectMed.select2({
        theme: 'bootstrap-5',
        placeholder: "Buscar medicamento...",
        ajax: {
            url: "{{ url_for('farmacia.buscar_medicamentos') }}",
            dataType: 'json',
            delay: 250,
            data: params => ({ q: params.term }),
            processResults: data => ({ results: data })
        },
        width: '100%'
    });

    // Evento al cambiar medicamento: Cargar lotes específicos de esta fila
    $selectMed.on('change', function() {
        const id_med = $(this).val();
        $selectLote.empty().append('<option value="">Cargando...</option>').prop('disabled', true);
        
        $.getJSON(`/farmacia/buscar_lotes_almacen/${id_med}`, function(data) {
            $selectLote.empty().append('<option value="">-- Lote --</option>');
            if (data.length > 0) {
                data.forEach(item => {
                    $selectLote.append(`<option value="${item.lote}" data-max="${item.cantidad}">Lote: ${item.lote} (${item.cantidad})</option>`);
                });
                $selectLote.prop('disabled', false);
            } else {
                $selectLote.append('<option value="">Sin stock</option>');
            }
        });
    });

    // Validar cantidad máxima según lote seleccionado
    $selectLote.on('change', function() {
        const max = $(this).find(':selected').data('max');
        $inputCant.attr('max', max);
        $infoStock.text(max ? `Disponible: ${max}` : "");
    });
}

function eliminarFila(btn) {
    if ($('#cuerpo-traslado tr').length > 1) $(btn).closest('tr').remove();
}

$(document).ready(() => agregarFila());
</script>
{% endblock %}
