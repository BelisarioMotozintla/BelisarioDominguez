{% extends "base.html" %}

{% block content %}
<h3 class="text-success">Registrar Nueva Entrada al Almacén</h3>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}




<form method="POST">
  <div class="mb-3">
    <label for="id_medicamento" class="form-control">Medicamento</label>
    <select id="id_medicamento" name="id_medicamento" style="width:100%" required>
        <!-- Se deja vacío, Select2 lo llenará mediante AJAX -->
    </select>
</div>


  <div class="mb-3">
    <label for="cantidad" class="form-label">Cantidad</label>
    <input type="number" class="form-control" id="cantidad" name="cantidad" min="1" required>
  </div>

  <div class="mb-3">
    <label for="lote" class="form-label">Lote</label>
    <input type="text" class="form-control" id="lote" name="lote">
  </div>

  <div class="mb-3">
    <label for="fecha_caducidad" class="form-label">Fecha de Caducidad</label>
    <input type="date" class="form-control" id="fecha_caducidad" name="fecha_caducidad">
  </div>

  <div class="mb-3">
    <label for="proveedor" class="form-label">Proveedor</label>
    <input type="text" class="form-control" id="proveedor" name="proveedor">
  </div>

  <div class="mb-3">
    <label for="observaciones" class="form-label">Observaciones</label>
    <textarea class="form-control" id="observaciones" name="observaciones" rows="3"></textarea>
  </div>

  <button type="submit" class="btn btn-success">
    <i class="bi bi-plus-square"></i> Guardar Entrada
  </button>
  <a href="{{ url_for('farmacia.listar_entradas') }}" class="btn btn-secondary">Cancelar</a>
</form>

<script>

$(document).ready(function() {
    $('#id_medicamento').select2({
        placeholder: "-- Busca por clave, nombre o principio activo --",
        allowClear: true,
        minimumInputLength: 2, // Espera a que escriban 2 letras para no saturar
        ajax: {
            // Ajusta 'farmacia.buscar_medicamentos' al nombre real de tu blueprint
            url: "{{ url_for('farmacia.buscar_medicamentos') }}", 
            dataType: 'json',
            delay: 300, // Tiempo de espera para enviar la petición mientras escriben
            data: function (params) {
                return {
                    q: params.term // 'q' es lo que espera tu ruta en request.args.get('q')
                };
            },
            processResults: function (data) {
                return {
                    results: data
                };
            },
            cache: true
        },
        width: '100%' // Asegura que ocupe todo el ancho del contenedor
    });
});
</script>


{% endblock %}
