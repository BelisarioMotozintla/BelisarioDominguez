{% extends "base.html" %}

{% block content %}
<div class="container-fluid mt-4 mb-5">
  <div class="card shadow">
    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
      <h2 class="h5 mb-0"><i class="bi bi-box-seam"></i> Recepción Masiva de Medicamentos</h2>
      <span class="badge bg-light text-dark">Modo Multi-Registro</span>
    </div>
    
    <div class="card-body">
      <form id="form-recepcion" method="POST" action="{{ url_for('farmacia.nueva_entrada') }}">
        
        <!-- SECCIÓN 1: DATOS GENERALES (CABECERA) -->
        <div class="row mb-4 p-3 bg-light rounded border">
          <div class="col-md-3 mb-3">
            <label class="form-label fw-bold">Destino de la Carga</label>
            <select name="destino" class="form-select border-primary" required>
              <option value="almacen">ALMACÉN GENERAL</option>
              <option value="farmacia">FARMACIA (ENTRADA DIRECTA)</option>
            </select>
            <small class="text-muted">¿A dónde entrará físicamente el stock?</small>
          </div>
          <div class="col-md-5 mb-3">
            <label class="form-label fw-bold">Proveedor</label>
            <input type="text" name="proveedor" class="form-control uppercase-input" placeholder="NOMBRE DEL PROVEEDOR">
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label fw-bold">Observaciones Generales</label>
            <textarea name="observaciones_general" class="form-control uppercase-input" rows="1"></textarea>
          </div>
        </div>

        <!-- SECCIÓN 2: TABLA DINÁMICA -->
        <div class="table-responsive">
          <table class="table table-bordered table-hover" id="tabla-medicamentos">
            <thead class="table-dark">
              <tr>
                <th style="width: 15%;">Medicamento (Clave/Nombre)</th>
                <th style="width: 20%;">Lote</th>
                <th style="width: 20%;">Cant.</th>
                <th style="width: 15%;">Caducidad</th>
                <th style="width: 10%;">Notas Item</th>
                <th style="width: 5%;"></th>
              </tr>
            </thead>
            <tbody id="cuerpo-tabla">
              <!-- Las filas se insertarán aquí -->
            </tbody>
          </table>
        </div>

        <div class="d-flex justify-content-between mt-3">
          <button type="button" class="btn btn-outline-primary" onclick="agregarFila()">
            <i class="bi bi-plus-circle"></i> Agregar otro medicamento
          </button>
          
          <div>
            <a href="{{ url_for('farmacia.listar_entradas') }}" class="btn btn-secondary me-2">Cancelar</a>
            <button type="submit" class="btn btn-success px-5 shadow">
              <i class="bi bi-check-all"></i> Procesar Toda la Entrada
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Template para nuevas filas (oculto) -->
<template id="fila-template">
  <tr>
    <td>
      <select name="id_medicamento[]" class="form-select select2-medicamento" required></select>
    </td>
    <td>
      <input type="text" name="lote[]" class="form-control uppercase-input" required placeholder="LOTE">
    </td>
    <td>
      <input type="number" name="cantidad[]" class="form-control" min="1" required placeholder="0">
    </td>
    <td>
      <input type="date" name="fecha_caducidad[]" class="form-control" required>
    </td>
    <td>
      <input type="text" name="notas_item[]" class="form-control uppercase-input" placeholder="Opcional">
    </td>
    <td class="text-center">
      <button type="button" class="btn btn-outline-danger btn-sm" onclick="eliminarFila(this)">
        <i class="bi bi-trash"></i>
      </button>
    </td>
  </tr>
</template>

<script>
let contadorFilas = 0;

function agregarFila() {
    const template = document.getElementById('fila-template').content.cloneNode(true);
    const tbody = document.getElementById('cuerpo-tabla');
    const nuevaFila = template.querySelector('tr');
    
    tbody.appendChild(nuevaFila);
    
    // Inicializar Select2 en la nueva fila
    const select = $(nuevaFila).find('.select2-medicamento');
    select.select2({
        placeholder: "Buscar...",
        minimumInputLength: 2,
        ajax: {
            url: "{{ url_for('farmacia.buscar_medicamentos') }}",
            dataType: 'json',
            delay: 250,
            data: params => ({ q: params.term }),
            processResults: data => ({ results: data }),
            cache: true
        },
        width: '100%'
    });

    // Aplicar mayúsculas a los inputs de esta fila
    $(nuevaFila).find('.uppercase-input').on('input', function() {
        this.value = this.value.toUpperCase();
    });
}

function eliminarFila(btn) {
    const filas = document.querySelectorAll('#cuerpo-tabla tr');
    if (filas.length > 1) {
        btn.closest('tr').remove();
    } else {
        alert("Debes registrar al menos un medicamento.");
    }
}

$(document).ready(function() {
    // Agregar la primera fila por defecto
    agregarFila();
});
</script>
{% endblock %}
