{% extends "base.html" %}

{% block content %}
<div class="container mt-4 mb-5">
  <div class="card shadow">
    <div class="card-header bg-success text-white">
      <h2 class="h5 mb-0"><i class="bi bi-capsule"></i> Registro de Nuevo Medicamento</h2>
    </div>
    <div class="card-body">
      <form method="POST" class="needs-validation" novalidate>
        <div class="row">
          <!-- Datos Básicos -->
          <div class="col-md-4 mb-3">
            <label class="form-label fw-bold">Clave</label>
            <input type="text" name="clave" id="clave_input" class="form-control" 
                   placeholder="010.000.0000.00" required 
                   pattern="^[A-Z0-9.]+$" title="Solo letras, números y puntos">
            <div class="invalid-feedback">La clave es obligatoria (ej. 010.000.4162.00).</div>
          </div>
          <div class="col-md-8 mb-3">
            <label class="form-label fw-bold">Principio Activo</label>
            <input type="text" name="principio_activo" class="form-control uppercase-input" 
                   placeholder="EJ. PARACETAMOL" required>
            <div class="invalid-feedback">El principio activo es obligatorio.</div>
          </div>

          <!-- Especificaciones -->
          <div class="col-md-3 mb-3">
            <label class="form-label">Presentación</label>
            <input type="text" name="presentacion" class="form-control uppercase-input" placeholder="EJ. TABLETAS">
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">Vía Administración</label>
            <input type="text" name="via_administracion" class="form-control uppercase-input" placeholder="EJ. ORAL">
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">Concentración</label>
            <input type="text" name="concentracion" class="form-control uppercase-input" placeholder="EJ. 500">
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">Unidad</label>
            <input type="text" name="unidad" class="form-control uppercase-input" placeholder="EJ. MG">
          </div>

          <!-- Control de Catálogos -->
          <div class="col-12 mb-3">
            <label class="form-label d-block fw-bold">Pertenencia a Catálogos:</label>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="checkbox" name="es_kit_basico" id="kit">
              <label class="form-check-label" for="kit">Kit Básico (150)</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="checkbox" name="es_180_claves" id="c180">
              <label class="form-check-label" for="c180">180 Claves</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="checkbox" name="es_general" id="general" checked>
              <label class="form-check-label" for="general">General</label>
            </div>
          </div>

          <!-- Niveles de Stock -->
          <div class="col-md-3 mb-3">
            <label class="form-label text-danger fw-bold">Stock Mínimo (Crítico)</label>
            <input type="number" name="stock_minimo" class="form-control" value="10" min="0" required>
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label text-primary fw-bold">Stock Máximo (Óptimo)</label>
            <input type="number" name="stock_maximo" class="form-control" value="100" min="1" required>
          </div>

          <!-- Movimiento -->
          <div class="col-md-3 mb-3">
            <label class="form-label">CPM Inicial</label>
            <input type="number" step="0.01" name="cpm" class="form-control" value="0.00" min="0">
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">Nivel de Movimiento</label>
            <select name="nivel_movimiento" class="form-select">
              <option value="Nulo" selected>NULO</option>
              <option value="Bajo">BAJO</option>
              <option value="Medio">MEDIO</option>
              <option value="Alto">ALTO</option>
            </select>
          </div>
        </div>

        <div class="mt-4 border-top pt-3 text-end">
          <a href="{{ url_for('farmacia.listar_medicamentos') }}" class="btn btn-outline-secondary me-2">Cancelar</a>
          <button type="submit" class="btn btn-success px-4">
            <i class="bi bi-save"></i> Guardar Medicamento
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  // 1. AUTO-FORMATEO DE CLAVE (000.000.0000.00)
  const claveInput = document.getElementById('clave_input');
  claveInput.addEventListener('input', function (e) {
    let value = e.target.value.replace(/[^A-Z0-9]/gi, '').toUpperCase();
    let formatted = "";
    if (value.length > 0) {
      formatted = value.slice(0, 3);
      if (value.length > 3) formatted += "." + value.slice(3, 6);
      if (value.length > 6) formatted += "." + value.slice(6, 10);
      if (value.length > 10) formatted += "." + value.slice(10, 12);
    }
    e.target.value = formatted.slice(0, 15);
  });

  // 2. Mayúsculas para campos de texto (excepto el select)
  document.querySelectorAll('.uppercase-input').forEach(function(input) {
    input.addEventListener('input', function() {
      this.value = this.value.toUpperCase();
    });
  });

  // 3. Validación de Bootstrap
  (function () {
    'use strict'
    var forms = document.querySelectorAll('.needs-validation')
    Array.prototype.slice.call(forms).forEach(function (form) {
      form.addEventListener('submit', function (event) {
        if (!form.checkValidity()) {
          event.preventDefault()
          event.stopPropagation()
        }
        form.classList.add('was-validated')
      }, false)
    })
  })()
</script>
{% endblock %}
