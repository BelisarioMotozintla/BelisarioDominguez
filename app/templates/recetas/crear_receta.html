{% extends "base.html" %}
{% block content %}
<div class="container mt-4 mb-5">
    <div class="card shadow border-0">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h4 class="mb-0"><i class="bi bi-file-earmark-plus"></i> Nueva Receta Médica</h4>
            <span class="badge bg-light text-dark fs-6">Folio: {{ folio }}</span>
        </div>
        <div class="card-body">
            <form method="POST" class="needs-validation" novalidate>
                <!-- Info Paciente y Médico -->
                <div class="row mb-4 bg-light p-3 rounded mx-0">
                    <div class="col-md-6 border-end">
                        <label class="text-muted small d-block text-uppercase">Paciente</label>
                        <span class="fw-bold h5">{{ paciente.nombre }}</span>
                    </div>
                    <div class="col-md-6 ps-md-4">
                        <label class="text-muted small d-block text-uppercase">Médico Prescriptor</label>
                        <span class="fw-bold">{{ current_user.usuario }}</span>
                    </div>
                </div>

                <!-- Diagnóstico -->
                <div class="mb-4">
                    <label for="diagnostico_id" class="form-label fw-bold">Diagnóstico (CIE-10)</label>
                    <select class="form-select select2" id="diagnostico_id" name="diagnostico_id" required>
                        <option value="">-- Buscar diagnóstico --</option>
                        {% for diag in diagnosticos %}
                        <option value="{{ diag.id_diagnostico }}">{{ diag.codigo }} - {{ diag.descripcion }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Medicamentos -->
                <h5 class="border-bottom pb-2 mb-3 text-secondary">Prescripción de Medicamentos</h5>
                <div class="row g-3">
                    {% for i in range(1, 4) %}
                    <div class="col-12">
                        <div class="card border shadow-sm h-100">
                            <div class="card-body bg-light-subtle">
                                <div class="row g-2">
                                    <div class="col-md-8">
                                        <label class="form-label small fw-bold">Medicamento {{ i }}</label>
                                        <select name="med_{{ i }}" class="form-select form-select-sm select-med" onchange="updateStock(this, {{ i }})">
                                            <option value="">-- Seleccionar medicamento --</option>
                                            {% for med in medicamentos %}
                                            <option value="{{ med.id }}" data-existencia="{{ med.existencia }}">
                                                {{ med.descripcion }}
                                            </option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label small fw-bold">Cantidad</label>
                                        <div class="input-group input-group-sm">
                                            <input type="number" name="cant_{{ i }}" id="cant_{{ i }}" class="form-control" min="1" placeholder="0">
                                            <span class="input-group-text bg-white small text-muted" id="stock_label_{{ i }}">Stock: 0</span>
                                        </div>
                                    </div>
                                    <div class="col-md-4">
                                        <input type="text" name="dosis_{{ i }}" class="form-control form-control-sm mt-1 uppercase-input" placeholder="Dosis (Ej: 1 CADA 8 HRS)">
                                    </div>
                                    <div class="col-md-8">
                                        <input type="text" name="indicaciones_{{ i }}" class="form-control form-control-sm mt-1 uppercase-input" placeholder="Indicaciones (Ej: DURANTE 5 DIAS)">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                </div>

                <div class="mt-4 pt-3 border-top d-flex justify-content-between">
                    <a href="{{ url_for('medicos.ver_nota', id_nota=nota.id_nota) }}" class="btn btn-outline-secondary">
                        <i class="bi bi-x-circle"></i> Cancelar
                    </a>
                    <button type="submit" class="btn btn-primary px-5 shadow">
                        <i class="bi bi-save"></i> Generar Receta
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // Actualizar visualización de stock dinámico
    function updateStock(select, index) {
        const option = select.options[select.selectedIndex];
        const stock = option.getAttribute('data-existencia') || 0;
        document.getElementById('stock_label_' + index).innerText = "Stock: " + stock;
        const inputCant = document.getElementById('cant_' + index);
        inputCant.max = stock;
    }

    $(document).ready(function() {
        $('.select2').select2({ theme: 'bootstrap-5' });
        
        // Convertir a mayúsculas
        $('.uppercase-input').on('input', function() {
            this.value = this.value.toUpperCase();
        });
    });
</script>
{% endblock %}
