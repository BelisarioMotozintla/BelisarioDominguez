{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="card shadow p-5 bg-white">
                <div class="alert alert-success shadow-sm">
                    <h3 class="alert-heading">¡Procesamiento Exitoso!</h3>
                    <p class="mb-0">Se han encuadrado las 150 claves del catálogo con entradas y salidas.</p>
                </div>

                <div class="mt-4">
                    <button id="btnDownload" class="btn btn-primary btn-lg shadow-sm px-5">
                        📥 Descargar Archivo JSON Maestro
                    </button>
                    <a href="{{ url_for('at.generador') }}" class="btn btn-outline-secondary btn-lg ms-3">Nueva Carga</a>
                </div>

                <div class="mt-5 text-start">
                    <h5 class="text-muted">Vista Previa (Primeros registros):</h5>
                    <pre class="bg-dark text-info p-3 rounded" style="max-height: 300px; overflow-y: auto;" id="preview"></pre>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const jsonString = {{ json_data | safe }};
    
    try {
        const dataObj = typeof jsonString === 'string' ? JSON.parse(jsonString) : jsonString;
        document.getElementById('preview').textContent = JSON.stringify(dataObj.slice(0, 10), null, 2);
    } catch (e) {
        document.getElementById('preview').textContent = "Error: " + e;
    }

    document.getElementById('btnDownload').addEventListener('click', function() {
        const contenido = typeof jsonString === 'string' ? jsonString : JSON.stringify(jsonString, null, 2);
        const blob = new Blob([contenido], { type: "application/json" });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "JSON_MAESTRO_COMPLETO.json";
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);
    });
</script>
{% endblock %}
