{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Generación de JSON Maestro (150 Claves)</h4>
            </div>
            <div class="card-body">
                <form action="/at/generador" method="POST" enctype="multipart/form-data">
                    <div class="mb-4">
                        <label class="form-label fw-bold">1. Reporte de Movimientos (Días 1 a 30):</label>
                        <input type="file" name="archivo_reporte" class="form-control" required>
                        <div class="form-text">El Excel con columnas: Clave, Desc, 1, 2... TOTAL.</div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold">2. Catálogo Maestro (150 Claves):</label>
                        <input type="file" name="archivo_catalogo" class="form-control" required>
                        <div class="form-text">El Excel con columnas: Clave, Descripcion, Stock.</div>
                    </div>

                    <button type="submit" class="btn btn-success btn-lg w-100 shadow-sm">Generar JSON Maestro</button>
                </form>
                {# Botón para regresar al index #}
        <a href="{{ url_for('farmacia.index') }}" class="btn btn-sm btn-outline-danger">Regresar</a>
            </div>
        </div>
    </div>
    {% endblock %}
